{{- $pool := .Values.nodepool }}
{{- $allNodes := (lookup "v1" "Node" "" "").items }}
{{- $nodes := list }}

{{- range $allNodes }}
  {{- if eq (index .metadata.labels "agentpool") $pool }}
    {{- $nodes = append $nodes . }}
  {{- end }}
{{- end }}

{{- $setCount := divf $.Values.agentCount 4 | ceil | int }}

{{- range $i := until $setCount }}
{{- $node := index $nodes $i }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ $.Values.deploymentName }}-{{ $i }}"
  namespace: {{ $.Values.namespace }}
spec:
  serviceName: "ado-agent"
  {{ if le $.Values.agentCount 4 -}}
  replicas: {{ $.Values.agentCount }}
  {{ else if and (eq $i 0) (ne (mod $.Values.agentCount 4) 0) -}}
  replicas: {{ mod $.Values.agentCount 4 }}
  {{ else -}}
  replicas: 4
  {{ end -}}
  selector:
    matchLabels:
      app: "{{ $.Values.deploymentName }}-{{ $i }}"
  template:
    metadata:
      labels:
        app: "{{ $.Values.deploymentName }}-{{ $i }}"
    spec:
      terminationGracePeriodSeconds: 300
      nodeName: {{ $node.metadata.name }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - "{{ $.Values.deploymentName }}-{{ $i }}"
                topologyKey: failure-domain.beta.kubernetes.io/zone
      containers:
      - name: {{ $.Values.deploymentName }}
        image: "{{ $.Values.publicAcrName }}.azurecr.io/{{ $.Values.containerImageName }}:{{ $.Values.imageTag }}"
        command: ["powershell"]
        args: ["./start.ps1"]
        imagePullPolicy: Always
        resources:
          limits:
            cpu: 700m
            memory: 3Gi
          requests:
            cpu: 270m
            memory: 256Mi
        env:
          - name: AZP_URL
            valueFrom:
              secretKeyRef:
                name: azp
                key: AZP_URL
          - name: AZP_TOKEN
            valueFrom:
              secretKeyRef:
                name: azp
                key: AZP_TOKEN
          - name: AZP_POOL
            value: {{ $.Values.azureDevopsAgentPool }}
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        volumeMounts:
        - mountPath: /azptmp
          name: azp-tmp-volume
        - mountPath: /azp/cache
          name: agent-cache
      tolerations:
        - key: agent-os
          operator: Equal
          value: windows
          effect: NoSchedule
      volumes:
      - name: azp-tmp-volume
        emptyDir:
          sizeLimit: 30Gi
  volumeClaimTemplates:
  - metadata:
      name: agent-cache
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: managed-csi-premium
      resources:
        requests:
          storage: {{ $.Values.persistentVolumeClaim.storage }}
{{- end }}
