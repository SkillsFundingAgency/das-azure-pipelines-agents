parameters:
  AgentCount:
  AzureDevopsAgentPool:
  AzureServiceConnection:
  ContainerImageName:
  DeploymentName:
  ImageTag:
  PoolName:
  PublicAcrName:
  Type:
  ValueFile:
  VerifyDeployment:
  WindowsDeployAgentsNodePoolLabel:

steps:
- template:  azure-pipelines-templates/deploy/step/kubernetes-create-secret.yml@das-platform-building-blocks
  parameters:
    AksClusterName: $(AKSSharedClusterName)
    AksResourceGroupName: $(AKSResourceGroupName)
    AzureServiceConnection: ${{ parameters.AzureServiceConnection }}
    KubectlVersion: $(KubectlVersion)
    Namespace: $(AgentNameSpace)
    SecretName: azp
    SecretArguments: --from-literal=AZP_URL=$(AZP_URL) --from-literal=AZP_TOKEN=$(AZP_TOKEN)
- task: KubeloginInstaller@0
- task: AzureCLI@2
  displayName: Label Nodes
  inputs:
    azureSubscription: ${{ parameters.AzureServiceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      echo "Getting AKS credentials"
      az aks get-credentials -g $(AKSResourceGroupName) -n $(AKSSharedClusterName) --overwrite-existing
      kubelogin convert-kubeconfig -l azurecli

      echo "Labelling nodes in pool: $POOL"
      i=0
      for node in $(kubectl get nodes -l agentpool=${{ parameters.PoolName }} -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | sort); do
        kubectl label node $node agent-group=$i --overwrite
        i=$((i+1))
      done
      echo "Finished labelling nodes"
- task: HelmInstaller@1
  inputs:
    helmVersionToInstall: latest
- task: HelmDeploy@1
  inputs:
    connectionType: Azure Resource Manager
    azureSubscription: ${{ parameters.AzureServiceConnection }}
    azureResourceGroup: $(AKSResourceGroupName)
    kubernetesCluster: $(AKSSharedClusterName)
    useClusterAdmin: true
    namespace: agents
    command: upgrade
    chartType: FilePath
    chartPath: $(System.DefaultWorkingDirectory)/agent-chart
    chartVersion: ^1.0.0
    releaseName: ${{ parameters.deploymentName }}
    install: true
    valueFile: $(System.DefaultWorkingDirectory)/${{ parameters.ValueFile }}
    overrideValues: |
      agentCount=${{ parameters.AgentCount }}
      azureDevopsAgentPool=${{ parameters.AzureDevopsAgentPool }}
      containerImageName=${{ parameters.ContainerImageName }}
      deploymentName=${{ parameters.DeploymentName }}
      imageTag=${{ parameters.ImageTag }}
      publicAcrName=${{ parameters.PublicAcrName }}
      type=${{ parameters.Type }}
      windowsDeployAgentsNodePoolLabel=${{ parameters.WindowsDeployAgentsNodePoolLabel }}
- task: Kubernetes@1
  condition: and(succeeded(), eq(${{ parameters.VerifyDeployment }}, 'true'))
  displayName: get rollout status for ${{ parameters.DeploymentName }}-0
  inputs:
    connectionType: Azure Resource Manager
    azureSubscriptionEndpoint: ${{parameters.AzureServiceConnection}}
    azureResourceGroup: $(AKSResourceGroupName)
    kubernetesCluster: $(AKSSharedClusterName)
    useClusterAdmin: true
    namespace: $(AgentNameSpace)
    command: rollout
    arguments: status deployment ${{ parameters.DeploymentName }}-0
